<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Unlocked! | ProLaunch Careers</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--green:#7bb640;--forest:#124745;--cream:#f7f9f4;--amber:#f59e0b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--forest);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    h1,h2,h3{font-family:'Syne',sans-serif;}
    .unlock-card{background:white;border-radius:28px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(18,71,69,0.12);border:2px solid rgba(123,182,64,0.3);}
    .checkmark{width:80px;height:80px;background:linear-gradient(135deg,var(--green),#5fa830);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.5rem;box-shadow:0 8px 24px rgba(123,182,64,0.3);animation:popIn 0.5s ease both;}
    @keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
    h1{font-size:1.8rem;font-weight:800;margin-bottom:0.5rem;color:var(--forest);}
    .subtitle{color:#6b7280;font-size:0.95rem;line-height:1.6;margin-bottom:1.75rem;}
    .timer-box{background:#fefce8;border:2px solid rgba(245,158,11,0.3);border-radius:14px;padding:1rem 1.5rem;margin-bottom:1.75rem;}
    .timer-box p{font-size:0.82rem;color:#92400e;margin-bottom:0.35rem;font-weight:600;}
    .timer-box .timer{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--amber);}
    .tools-list{text-align:left;background:#f8fdf4;border-radius:14px;padding:1.25rem;margin-bottom:1.75rem;}
    .tools-list p{font-size:0.8rem;color:var(--forest);font-weight:700;margin-bottom:0.6rem;font-family:'Syne',sans-serif;}
    .tool-item{display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;color:#374151;padding:0.25rem 0;}
    .tool-check{color:var(--green);font-weight:700;}
    .btn-go{display:block;width:100%;background:var(--forest);color:white;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;padding:1rem;border-radius:50px;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 16px rgba(18,71,69,0.2);}
    .btn-go:hover{background:#1a5f5c;transform:translateY(-1px);}
  </style>
</head>
<body>
  <div class="unlock-card">
    <div class="checkmark">🎉</div>
    <h1>You're In!</h1>
    <p class="subtitle">Payment confirmed. You now have <strong>24-hour premium access</strong> to all ProLaunch career tools.</p>

    <div class="timer-box">
      <p>⏱ Your access expires in:</p>
      <div class="timer" id="countdown">24:00:00</div>
    </div>

    <div class="tools-list">
      <p>Unlocked Tools:</p>
      <div class="tool-item"><span class="tool-check">✓</span> CV Analyzer (was already free)</div>
      <div class="tool-item"><span class="tool-check">✓</span> Resume Builder</div>
      <div class="tool-item"><span class="tool-check">✓</span> Cover Letter Generator</div>
      <div class="tool-item"><span class="tool-check">✓</span> Interview Prep</div>
      <div class="tool-item"><span class="tool-check">✓</span> Career Insights</div>
    </div>

    <a href="dashboard.html" class="btn-go" id="dashboard-btn">🚀 Go to My Dashboard</a>
  </div>

  <script src="../shared.js"></script>
  <script>
    // Grant premium access immediately
    PL.grantPremium();

    // Live countdown
    function updateCountdown() {
      const left = PL.premiumTimeLeft();
      if (left) {
        document.getElementById('countdown').textContent = left;
      } else {
        document.getElementById('countdown').textContent = 'Expired';
      }
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>
</body>
</html>
